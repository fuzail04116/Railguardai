# Nixpacks config for Railway deployment
# Railway uses Nixpacks to auto-build Python projects

[phases.setup]
nixPkgs = ["python311", "gcc", "libffi", "openssl"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "python -c \"from ultralytics import YOLO; YOLO('yolov8n.pt')\"",
  "python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')\"",
  "python -c \"from rag.embedder import build_sop_vectorstore; build_sop_vectorstore()\""
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
